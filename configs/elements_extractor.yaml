dataset:
  sensor_dir: "./configs/sensors/velodyne64" # options: velodyne64, velodyne16, avia, mid360, aeva, ouster
  output_file: "Thirdparty/ElementsExtractor/temp/"

  min_range: 2
  max_range: 80
  min_cluster_size: 20

cluster_mtd: "travel" # options: dcvc, travel, dbscan

extraction:
  num_clusters: 500
  num_planes: 500
  num_lines: 500

save:
  save_plane: False
  save_line: False
  save_cluster: False
  save_ground: False
  remove_ground: True
