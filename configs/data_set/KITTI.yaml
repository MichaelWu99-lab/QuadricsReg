DATA_SET:
  name: 'KITTI'
  data_root: '<USER_FILL_HERE>/kitti_odometry/dataset'
  label_dir: '<USER_FILL_HERE>/data_odometry_labels/dataset/sequences'
  semantic_yaml: '<USER_FILL_HERE>/semantic-kitti.yaml'
  has_semantics: true
  default_extraction_method: 'Pre_semantics'

# data generation
sequence_list: ["00", "01", "02", "03", "04", "05", "06", "07", "08", "09", "10"]
# registration evaluation
sequence_list_reg: ["00", "01", "02", "03", "04", "05", "06", "07", "08", "09", "10"]

benchmark:
  enabled: true
  # GT poses from SemanticKITTI (more accurate than official KITTI poses).
  # Leave empty to use the bundled benchmarks/sem_kitti_poses/.
  poses_root: ''
  sequences: [0, 2, 5, 6, 8]
  distance_levels:
    "0_10":  [0, 10]
    "10_20": [10, 20]
    "20_30": [20, 30]
  sample_interval_m: 2.0
  skip_frames: 250
  icp_refine: true
  icp_voxel: 0.05
  icp_max_corr_dist: 0.2
  icp_max_iter: 500
  pair_mode: 'intra_seq_lc'

# data generation
semantics_seg:
  car: cluster
  vegetation: cluster
  trunk: cluster
other_instance: ["plane","line","ground"]

semantics_quadrics:
  car: ellipsoid
  vegetation: ellipsoid
  trunk: elliptic_cylinder
  plane: plane
  line: line
  ground: plane

# registration
semantics_quadrics_reg:
  car: ellipsoid
  vegetation: ellipsoid
  trunk: elliptic_cylinder
  plane: plane
  line: line

  car_point: point
  vegetation_point: point
  trunk_point: point
  plane_point: point
  line_point: point


  cluster: ellipsoid
  ellipsoid: ellipsoid
  elliptic_cylinder: elliptic_cylinder
  elliptic_cone: elliptic_cone

  cluster_point: point
  ellipsoid_point: point
  elliptic_cylinder_point: point
  elliptic_cone_point: point