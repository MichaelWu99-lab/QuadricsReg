DATA_SET:
  name: 'Apollo-SouthBay'
  data_root: '<USER_FILL_HERE>/Apollo-SouthBay'

  label_dir: ''
  semantic_yaml: ''
  has_semantics: false
  default_extraction_method: 'cluster'

benchmark:
  enabled: true

  sequences: [20, 21, 22, 23, 24, 25, 26]
  distance_levels:
    "0_10":  [0, 10]
    "10_20": [10, 20]
    "20_30": [20, 30]
    "30_40": [30, 40]
  sample_interval_m: 2.0
  skip_frames: 250

  icp_refine: false
  icp_voxel: 0.05
  icp_max_corr_dist: 0.2
  icp_max_iter: 500
  pair_mode: 'intra_seq_lc'

sequence_list: ["0","1","2","3"]
sequence_list_reg: ["0","1","2","3"]

###################################

# uses KITTI semantic labels
semantics_seg:
  car: cluster
  vegetation: cluster
  trunk: cluster
other_instance: ["plane","line","ground"]

semantics_quadrics:
  car: ellipsoid
  vegetation: ellipsoid
  trunk: elliptic_cylinder
  plane: plane
  line: line
  ground: plane


  cluster: ellipsoid

# registration
semantics_quadrics_reg:
  car: ellipsoid
  vegetation: ellipsoid
  trunk: elliptic_cylinder
  plane: plane
  line: line

  car_point: point
  vegetation_point: point
  trunk_point: point
  plane_point: point
  line_point: point


  cluster: ellipsoid
  ellipsoid: ellipsoid
  elliptic_cylinder: elliptic_cylinder
  elliptic_cone: elliptic_cone

  cluster_point: point
  ellipsoid_point: point
  elliptic_cylinder_point: point
  elliptic_cone_point: point

